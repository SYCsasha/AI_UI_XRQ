<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Code Renderer</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app" class="mode-render">
    <header class="toolbar">
      <div class="title">AI Code Renderer</div>
      <div class="status"><span id="status-dot"></span><span id="status-text">connecting</span></div>
      <div class="actions actions-render" id="render-actions">
        <button id="edit-btn" class="btn">编辑</button>
        <button id="download-btn" class="btn">下载</button>
        <button id="screenshot-btn" class="btn">截图</button>
      </div>
      <div class="actions actions-code" id="code-actions">
        <button id="render-btn" class="btn btn-primary">渲染</button>
        <button id="reset-btn" class="btn btn-danger">重置</button>
      </div>
    </header>

    <main class="content">
      <section id="render-view" class="view render-view">
        <article id="render-card" class="render-card">
          <div class="render-meta">
            <span id="render-filename">等待代码</span>
            <span id="render-lang">plaintext</span>
            <span id="render-type" class="render-type">代码</span>
          </div>
          <div id="render-content" class="render-content">
            <pre><code id="render-code" class="hljs">等待来自 CLI 的代码推送...</code></pre>
          </div>
        </article>
      </section>

      <section id="code-view" class="view code-view">
        <div class="mobile-tabs">
          <button id="toggle-sidebar" class="btn">代码列表</button>
          <button id="swipe-tip" class="btn btn-ghost" disabled>右滑返回渲染页</button>
        </div>
        <aside id="sidebar" class="sidebar">
          <div class="sidebar-header">Code Blocks</div>
          <div id="sidebar-list"></div>
        </aside>
        <section class="editor-pane">
          <div class="editor-meta">
            <span id="editor-filename">-</span>
            <span id="editor-time">-</span>
          </div>
          <textarea id="editor" spellcheck="false" aria-label="代码编辑区"></textarea>
        </section>
      </section>
    </main>
  </div>

  <!-- Renderer libraries -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" integrity="sha384-KwKQjNje46nSQbCANyVrDJsI8ELHjXvqAP5VK5nH9sDvQlVfuOWdQy4WY8dUNJ8hT" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js/build/highlight.min.js" integrity="sha384-MbBzqHbKnfKGLKT7Q3p5Nm8G64yGb5VK8TJhgvp8hH3w5sGkkE7nGJCBqB9bGNjx" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js" integrity="sha384-5CW+DPvQgTn0E5Z2s3Y8EKjRNPKPNa+7GUiHX3g1vYnXm3QgxATsqBm3+tVkkU5N" crossorigin="anonymous"></script>
  
  <!-- Renderer modules -->
  <script src="/renderers/code-renderer.js"></script>
  <script src="/renderers/markdown-renderer.js"></script>
  <script src="/renderers/json-tree-renderer.js"></script>
  <script src="/renderers/html-preview-renderer.js"></script>
  <script src="/renderers/image-renderer.js"></script>
  <script src="/renderers/pdf-renderer.js"></script>
  <script src="/renderers/dispatcher.js"></script>
  
  <!-- Main client -->
  <script src="/client.js"></script>
</body>
</html>
