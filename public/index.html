<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Fluid Showcase - Full Sandbox</title>
    <!-- 引入 Tailwind CSS 强力驱动视觉 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 FontAwesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #08080a;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            transition: background-color 0.5s ease;
        }
        .code-font {
            font-family: 'Fira Code', monospace;
        }
        .aurora-bg-glow {
            box-shadow: 0 0 50px rgba(16, 185, 129, 0.05);
            transition: box-shadow 0.5s ease;
        }
        .custom-scroll::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.01);
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 3px;
        }
        .custom-scroll::-webkit-scrollbar-thumb:hover {
            background: rgba(16, 185, 129, 0.3);
        }

        /* 旋转星云与扫光动画 */
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.3; transform: scale(0.98); }
            50% { opacity: 0.6; transform: scale(1.02); }
        }
        .core-pulse {
            animation: pulse-glow 4s ease-in-out infinite;
        }

        /* 🌊 超唯美量子水纹涟漪特效 */
        @keyframes ripple-wave {
            0% {
                transform: scale(0.3);
                opacity: 0.8;
            }
            50% {
                opacity: 0.4;
            }
            100% {
                transform: scale(1.6);
                opacity: 0;
            }
        }
        .ripple-layer {
            position: absolute;
            border-radius: 50%;
            border: 1.5px solid var(--theme-color, #10b981);
            opacity: 0;
            pointer-events: none;
        }
        .ripple-1 { animation: ripple-wave 6s cubic-bezier(0.1, 0.8, 0.3, 1) infinite; }
        .ripple-2 { animation: ripple-wave 6s cubic-bezier(0.1, 0.8, 0.3, 1) infinite; animation-delay: 2s; }
        .ripple-3 { animation: ripple-wave 6s cubic-bezier(0.1, 0.8, 0.3, 1) infinite; animation-delay: 4s; }

        /* 动态背景转换 */
        .theme-cyber {
            --theme-color: #10b981;
            --theme-glow: rgba(16, 185, 129, 0.2);
        }
        .theme-cyber-purple {
            --theme-color: #a855f7;
            --theme-glow: rgba(168, 85, 247, 0.2);
        }
        .theme-cyber-blue {
            --theme-color: #06b6d4;
            --theme-glow: rgba(6, 182, 212, 0.2);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.2s ease-out;
        }
    </style>
</head>
<body class="text-gray-200 h-screen flex overflow-hidden selection:bg-emerald-500/20 selection:text-emerald-300 theme-cyber">
...
</body>
</html>
