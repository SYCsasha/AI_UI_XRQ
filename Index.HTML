<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Code Renderer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,600;1,300&family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/base16/tomorrow-night.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --bg1: #0f0f17;
    --bg2: #141420;
    --bg3: #1a1a2e;
    --border: #1e1e35;
    --border-bright: #2a2a50;
    --text: #c8c8e8;
    --text-dim: #5a5a80;
    --text-bright: #e8e8ff;
    --accent: #6c63ff;
    --accent2: #00d4aa;
    --accent3: #ff6b9d;
    --accent4: #ffa947;
    --green: #39ff87;
    --red: #ff4d6d;
    --yellow: #ffdd57;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Syne', sans-serif;
    --radius: 6px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    overflow: hidden;
  }

  /* Scan line effect */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.06) 2px,
      rgba(0,0,0,0.06) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* Ambient glow */
  body::after {
    content: '';
    position: fixed;
    top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 800px; height: 500px;
    background: radial-gradient(ellipse, rgba(108,99,255,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* LAYOUT */
  #app {
    display: grid;
    grid-template-rows: 56px 1fr;
    grid-template-columns: 260px 1fr;
    height: 100vh;
    position: relative;
    z-index: 1;
  }

  /* TOP BAR */
  #topbar {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    padding: 0 20px;
    background: var(--bg1);
    border-bottom: 1px solid var(--border);
    gap: 16px;
    position: relative;
    z-index: 10;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--sans);
    font-weight: 800;
    font-size: 15px;
    letter-spacing: 0.05em;
    color: var(--text-bright);
  }

  .logo-icon {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }

  .logo-sub {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    font-weight: 300;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .topbar-spacer { flex: 1; }

  .status-pill {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 12px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--red);
    transition: background 0.3s;
    box-shadow: 0 0 0 0 rgba(57,255,135,0);
  }
  .status-dot.connected {
    background: var(--green);
    animation: pulse-dot 2s infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { box-shadow: 0 0 0 0 rgba(57,255,135,0.5); }
    50% { box-shadow: 0 0 0 5px rgba(57,255,135,0); }
  }

  .btn-clear {
    padding: 5px 14px;
    background: transparent;
    border: 1px solid var(--border-bright);
    border-radius: var(--radius);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-clear:hover { border-color: var(--red); color: var(--red); }

  .clients-badge {
    display: flex; align-items: center; gap: 5px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent2);
  }

  /* SIDEBAR */
  #sidebar {
    background: var(--bg1);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px 0;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .sidebar-section {
    padding: 6px 16px;
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  .sidebar-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 16px;
    cursor: pointer;
    transition: background 0.15s;
    border-left: 2px solid transparent;
    margin-bottom: 1px;
  }
  .sidebar-item:hover { background: var(--bg2); }
  .sidebar-item.active { background: var(--bg2); border-left-color: var(--accent); }

  .sidebar-lang-badge {
    padding: 1px 6px;
    border-radius: 3px;
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .sidebar-info { flex: 1; min-width: 0; }

  .sidebar-filename {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }

  .sidebar-time {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-dim);
  }

  /* MAIN CONTENT */
  #main {
    overflow-y: auto;
    padding: 24px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* EMPTY STATE */
  #empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
    gap: 16px;
    color: var(--text-dim);
  }

  .empty-icon {
    font-size: 48px;
    opacity: 0.3;
  }

  .empty-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  .empty-hint {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    opacity: 0.7;
    line-height: 1.8;
  }

  .empty-cmd {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 18px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent2);
  }

  /* CODE BLOCK */
  .code-block {
    background: var(--bg1);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    animation: slide-in 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    scroll-margin-top: 10px;
  }

  @keyframes slide-in {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .block-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
  }

  .block-lang {
    padding: 2px 8px;
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .block-filename {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    flex: 1;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .block-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent4);
    opacity: 0.85;
  }

  .block-time {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    flex-shrink: 0;
  }

  .block-actions {
    display: flex;
    gap: 6px;
  }

  .block-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 10px;
    padding: 3px 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .block-btn:hover { border-color: var(--accent); color: var(--accent); }
  .block-btn.copied { border-color: var(--green); color: var(--green); }

  .block-body {
    position: relative;
  }

  .block-body pre {
    margin: 0 !important;
    padding: 16px 20px !important;
    background: transparent !important;
    font-family: var(--mono) !important;
    font-size: 13px !important;
    line-height: 1.65 !important;
    overflow-x: auto;
  }

  .block-body pre code {
    font-family: var(--mono) !important;
    font-size: 13px !important;
    background: transparent !important;
  }

  /* hljs overrides */
  .hljs { background: transparent !important; }

  .block-lines {
    position: absolute;
    left: 0; top: 0;
    padding: 16px 0;
    width: 42px;
    text-align: right;
    padding-right: 12px;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.65;
    color: var(--border-bright);
    user-select: none;
    border-right: 1px solid var(--border);
  }

  .block-body-inner {
    padding-left: 42px;
  }

  .block-footer {
    padding: 6px 16px;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
  }

  .block-stat { display: flex; gap: 4px; align-items: center; }
  .block-stat span { color: var(--text); }

  /* Lang colors */
  .lang-python   { background: rgba(55,118,171,0.2); color: #4ec9b0; }
  .lang-javascript, .lang-js { background: rgba(255,217,0,0.15); color: #f0db4f; }
  .lang-typescript, .lang-ts { background: rgba(0,122,204,0.2); color: #007acc; }
  .lang-go       { background: rgba(0,173,216,0.2); color: #00add8; }
  .lang-rust     { background: rgba(220,103,69,0.2); color: #ce422b; }
  .lang-bash, .lang-shell { background: rgba(57,255,135,0.15); color: #39ff87; }
  .lang-json     { background: rgba(255,165,0,0.15); color: #ffa947; }
  .lang-yaml     { background: rgba(108,99,255,0.2); color: #6c63ff; }
  .lang-html     { background: rgba(228,77,38,0.2); color: #e44d26; }
  .lang-css      { background: rgba(38,77,228,0.2); color: #264de4; }
  .lang-sql      { background: rgba(255,107,157,0.2); color: #ff6b9d; }
  .lang-java     { background: rgba(176,114,25,0.2); color: #b07219; }
  .lang-cpp, .lang-c { background: rgba(0,90,156,0.2); color: #005a9c; }
  .lang-default  { background: rgba(100,100,150,0.2); color: #aaaacc; }

  /* TOAST */
  #toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 1000;
    pointer-events: none;
  }

  .toast-item {
    background: var(--bg2);
    border: 1px solid var(--border-bright);
    border-radius: var(--radius);
    padding: 10px 16px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    animation: toast-in 0.3s ease;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }

  .toast-item.new-code {
    border-left: 3px solid var(--green);
    color: var(--green);
  }

  @keyframes toast-in {
    from { opacity: 0; transform: translateX(20px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 3px; }

  /* NEW badge */
  .new-badge {
    display: inline-block;
    background: var(--green);
    color: var(--bg);
    font-family: var(--mono);
    font-size: 8px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 3px;
    letter-spacing: 0.06em;
    animation: badge-fade 3s forwards;
  }
  @keyframes badge-fade {
    0%, 60% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* WS indicator */
  #ws-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,10,15,0.85);
    z-index: 9000;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  #ws-overlay.show { display: flex; }
  .ws-overlay-content {
    text-align: center;
    font-family: var(--mono);
    color: var(--text-dim);
  }
  .ws-spinner {
    width: 40px; height: 40px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="app">
  <!-- TOP BAR -->
  <header id="topbar">
    <div class="logo">
      <div class="logo-icon">⌬</div>
      <div>
        <div>AI Code Renderer</div>
        <div class="logo-sub">CLI → WebSocket → UI</div>
      </div>
    </div>
    <div class="topbar-spacer"></div>
    <div class="clients-badge">
      <svg width="12" height="12" viewBox="0 0 12 12"><circle cx="6" cy="4" r="2.5" fill="currentColor"/><path d="M1 11c0-2.76 2.24-5 5-5s5 2.24 5 5" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
      <span id="client-count">0</span> viewing
    </div>
    <div class="status-pill">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">connecting...</span>
    </div>
    <button class="btn-clear" onclick="clearHistory()">× clear</button>
  </header>

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="sidebar-section">Code Blocks</div>
    <div id="sidebar-list"></div>
  </aside>

  <!-- MAIN -->
  <main id="main">
    <div id="empty-state">
      <div class="empty-icon">◈</div>
      <div class="empty-title">Waiting for code...</div>
      <div class="empty-hint">
        Send code from your terminal using the CLI tool<br>
        All blocks appear here in real-time
      </div>
      <div class="empty-cmd">$ ai-push script.py --label "My Script"</div>
      <div class="empty-cmd">$ echo "print('hello')" | ai-push --lang python</div>
    </div>
    <div id="blocks-container"></div>
  </main>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- WS Reconnect overlay -->
<div id="ws-overlay">
  <div class="ws-overlay-content">
    <div class="ws-spinner"></div>
    <div>Reconnecting to server...</div>
  </div>
</div>

<script>
const WS_URL = `ws://${location.host}`;
let ws, reconnectTimer;
let blocks = []; // { id, lang, code, filename, label, timestamp, ... }
let activeId = null;

// Lang badge class
function langClass(lang) {
  const l = (lang || 'plaintext').toLowerCase();
  const known = ['python','javascript','typescript','go','rust','bash','shell','json','yaml','html','css','sql','java','cpp','c'];
  return known.includes(l) ? `lang-${l}` : 'lang-default';
}

// Format time
function fmtTime(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString('zh-CN', { hour12: false });
}

// Format relative
function fmtRel(iso) {
  const diff = (Date.now() - new Date(iso).getTime()) / 1000;
  if (diff < 10) return 'just now';
  if (diff < 60) return `${Math.floor(diff)}s ago`;
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  return `${Math.floor(diff/3600)}h ago`;
}

// Line numbers
function makeLineNums(code) {
  const lines = code.split('\n');
  return lines.map((_, i) => `<div>${i + 1}</div>`).join('');
}

// Highlight code
function highlight(code, lang) {
  const l = (lang || '').toLowerCase();
  if (hljs.getLanguage(l)) {
    return hljs.highlight(code, { language: l, ignoreIllegals: true }).value;
  }
  return hljs.highlightAuto(code).value;
}

// Count chars / lines
function codeStats(code) {
  const lines = code.split('\n').length;
  const chars = code.length;
  const words = code.trim().split(/\s+/).length;
  return { lines, chars, words };
}

// Render a single block
function renderBlock(block, isNew = false) {
  const { id, lang, code, filename, label, timestamp, session } = block;
  const stats = codeStats(code);
  const lc = langClass(lang);
  const highlighted = highlight(code, lang);

  const el = document.createElement('div');
  el.className = 'code-block';
  el.id = `block-${id}`;
  el.innerHTML = `
    <div class="block-header">
      <span class="block-lang ${lc}">${lang || 'text'}</span>
      <span class="block-filename">${escHtml(filename || 'untitled')}</span>
      ${label ? `<span class="block-label">${escHtml(label)}</span>` : ''}
      ${isNew ? `<span class="new-badge">NEW</span>` : ''}
      <span class="block-time">${fmtTime(timestamp)}</span>
      <div class="block-actions">
        <button class="block-btn" onclick="copyBlock('${id}', this)">copy</button>
      </div>
    </div>
    <div class="block-body">
      <div class="block-lines">${makeLineNums(code)}</div>
      <div class="block-body-inner">
        <pre><code class="hljs">${highlighted}</code></pre>
      </div>
    </div>
    <div class="block-footer">
      <div class="block-stat">lines <span>${stats.lines}</span></div>
      <div class="block-stat">chars <span>${stats.chars}</span></div>
      ${session && session !== 'default' ? `<div class="block-stat">session <span>${escHtml(session)}</span></div>` : ''}
    </div>
  `;
  return el;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Render sidebar item
function renderSidebarItem(block, isNew = false) {
  const { id, lang, filename, timestamp } = block;
  const lc = langClass(lang);
  const el = document.createElement('div');
  el.className = `sidebar-item${activeId === id ? ' active' : ''}`;
  el.id = `si-${id}`;
  el.innerHTML = `
    <span class="sidebar-lang-badge ${lc}">${(lang || 'txt').slice(0,4)}</span>
    <div class="sidebar-info">
      <div class="sidebar-filename">${escHtml(filename || 'untitled')}</div>
      <div class="sidebar-time">${fmtTime(timestamp)}</div>
    </div>
  `;
  el.onclick = () => scrollTo(id);
  return el;
}

// Scroll to block
function scrollTo(id) {
  activeId = id;
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  const si = document.getElementById(`si-${id}`);
  if (si) si.classList.add('active');
  const block = document.getElementById(`block-${id}`);
  if (block) block.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// Copy block
function copyBlock(id, btn) {
  const block = blocks.find(b => b.id == id);
  if (!block) return;
  navigator.clipboard.writeText(block.code).then(() => {
    btn.textContent = '✓ copied';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 1500);
  });
}

// Render all
function renderAll(data) {
  blocks = [...data];
  const container = document.getElementById('blocks-container');
  const sidebar = document.getElementById('sidebar-list');
  const empty = document.getElementById('empty-state');
  container.innerHTML = '';
  sidebar.innerHTML = '';

  if (blocks.length === 0) {
    empty.style.display = 'flex';
    return;
  }
  empty.style.display = 'none';

  blocks.forEach(b => {
    container.appendChild(renderBlock(b, false));
    sidebar.appendChild(renderSidebarItem(b, false));
  });
}

// Add new block
function addBlock(block) {
  const existing = blocks.findIndex(b => b.id === block.id);
  if (existing !== -1) return;

  blocks.unshift(block);

  const container = document.getElementById('blocks-container');
  const sidebar = document.getElementById('sidebar-list');
  const empty = document.getElementById('empty-state');

  empty.style.display = 'none';

  const blockEl = renderBlock(block, true);
  container.insertBefore(blockEl, container.firstChild);

  const sidebarEl = renderSidebarItem(block, true);
  sidebar.insertBefore(sidebarEl, sidebar.firstChild);

  // Toast
  showToast(`▶ ${block.filename} (${block.lang})`, 'new-code');

  // Auto scroll to top
  document.getElementById('main').scrollTo({ top: 0, behavior: 'smooth' });
}

// Clear
function clearHistory() {
  fetch('/api/clear', { method: 'POST' });
}

// Toast
function showToast(msg, cls = '') {
  const t = document.getElementById('toast');
  const el = document.createElement('div');
  el.className = `toast-item ${cls}`;
  el.textContent = msg;
  t.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// WS connection
function connect() {
  document.getElementById('ws-overlay').classList.remove('show');
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    document.getElementById('status-dot').classList.add('connected');
    document.getElementById('status-text').textContent = 'live';
    document.getElementById('ws-overlay').classList.remove('show');
    clearTimeout(reconnectTimer);
  };

  ws.onmessage = evt => {
    try {
      const msg = JSON.parse(evt.data);
      if (msg.type === 'history') renderAll(msg.data);
      else if (msg.type === 'code_block') addBlock(msg.data);
      else if (msg.type === 'clear') renderAll([]);
      else if (msg.type === 'stats') {
        document.getElementById('client-count').textContent = msg.data.clients || 0;
      }
    } catch {}
  };

  ws.onclose = () => {
    document.getElementById('status-dot').classList.remove('connected');
    document.getElementById('status-text').textContent = 'disconnected';
    document.getElementById('ws-overlay').classList.add('show');
    reconnectTimer = setTimeout(connect, 2000);
  };

  ws.onerror = () => ws.close();
}

connect();

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('main').scrollTo({ top: 0, behavior: 'smooth' });
});
</script>
</body>
</html>
